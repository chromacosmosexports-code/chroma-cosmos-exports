<script>
    const SUPABASE_URL = 'https://mfulkcvojtgnciuplgsj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mdWxrY3ZvanRnbmNpdXBsZ3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTE3MDAsImV4cCI6MjA5ODM4NzcwMH0.L97XBramzNknrTUOoYLdBtlI_S67woPuGdim01gXOog';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadData() {
        try {
            const [resProducts, resCategories] = await Promise.all([
                db.from('products').select('*'),
                db.from('categories').select('*')
            ]);
            if (resProducts.error) throw resProducts.error;
            if (resCategories.error) throw resCategories.error;
            window.allProducts = resProducts.data || [];
            window.allCategories = resCategories.data || [];
            
            renderCategories();
            renderProducts('all');
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('productGrid').innerHTML = '<p class="col-span-full text-center text-red-500">Failed to load data.</p>';
            document.getElementById('categoryFilter').innerHTML = '<p class="text-red-500 px-3">Failed to load categories.</p>';
        }
    }

    function renderCategories() {
        const filterUl = document.getElementById('categoryFilter');
        filterUl.innerHTML = '';

        // Add "All" button
        const allLi = document.createElement('li');
        allLi.innerHTML = `
            <button data-filter="all" class="category-btn w-full text-left font-label-md text-label-md py-2 px-3 bg-primary text-on-primary rounded shadow-sm flex items-center justify-between transition-colors">
                All Categories
                <span class="material-symbols-outlined text-sm">chevron_right</span>
            </button>
        `;
        filterUl.appendChild(allLi);

        // Add dynamic categories
        if (window.allCategories) {
            window.allCategories.forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <button data-filter="${cat.slug}" class="category-btn w-full text-left font-label-md text-label-md py-2 px-3 text-on-surface-variant hover:bg-surface-variant hover:text-primary rounded transition-colors flex items-center justify-between">
                        ${cat.name}
                        <span class="material-symbols-outlined text-sm">chevron_right</span>
                    </button>
                `;
                filterUl.appendChild(li);
            });
        }

        // Attach event listeners to new buttons
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                buttons.forEach(btn => {
                    btn.className = "category-btn w-full text-left font-label-md text-label-md py-2 px-3 text-on-surface-variant hover:bg-surface-variant hover:text-primary rounded transition-colors flex items-center justify-between";
                });
                button.className = "category-btn w-full text-left font-label-md text-label-md py-2 px-3 bg-primary text-on-primary rounded shadow-sm flex items-center justify-between transition-colors";
                renderProducts(button.getAttribute('data-filter'));
            });
        });
    }

    function renderProducts(filter) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        
        if (!window.allProducts) return;

        const filtered = filter === 'all' 
            ? window.allProducts 
            : window.allProducts.filter(p => p.category === filter);

        if (filtered.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No products found in this category.</p>';
            return;
        }

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = "product-card bg-surface rounded-lg shadow-sm border border-surface-variant overflow-hidden hover:shadow-md transition-shadow duration-300 flex flex-col";
            card.setAttribute('data-category', p.category);
            
            card.innerHTML = `
                <img class="w-full h-48 object-cover" data-alt="${p.title}" src="${p.image}"/>
                <div class="p-md flex flex-col flex-grow">
                    <h3 class="font-headline-md text-headline-md text-primary mb-xs">${p.title}</h3>
                    <div class="space-y-xs mb-md flex-grow">
                        <p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-outline">public</span> Origin: ${p.origin || 'N/A'}
                        </p>
                        <p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-outline">factory</span> Capacity: ${p.capacity || 'N/A'}
                        </p>
                        <p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-outline">verified</span> Grade: ${p.grade}
                        </p>
                        <p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-outline">inventory_2</span> MOQ: ${p.moq}
                        </p>
                    </div>
                    <button onclick="window.open('https://wa.me/919063896610', '_blank')" class="w-full font-label-md text-label-md bg-transparent border-2 border-primary text-primary hover:bg-primary-container hover:text-on-primary hover:border-primary-container py-2 rounded transition-colors duration-300">
                        Request Quote
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
